<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Galaxy Explorer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Loader -->
    <div class="loader-overlay" id="loader">
        <div class="loader-content">
            <div class="loader-spinner">
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                    <circle cx="24" cy="24" r="20" stroke="rgba(99,102,241,0.15)" stroke-width="3"/>
                    <circle cx="24" cy="24" r="20" stroke="url(#loaderGrad)" stroke-width="3" stroke-linecap="round" stroke-dasharray="80 50"/>
                    <defs><linearGradient id="loaderGrad" x1="0" y1="0" x2="48" y2="48"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#06b6d4"/></linearGradient></defs>
                </svg>
            </div>
            <span class="loader-text">Loading Explorer</span>
        </div>
    </div>

    <div class="cursor-glow" id="cursorGlow"></div>
    <div class="bg-grid"></div>
    <div class="bg-radial"></div>

    <!-- Header -->
    <header id="header">
        <div class="logo">
            <span class="logo-icon">
                <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
                    <circle cx="16" cy="16" r="14" stroke="url(#lg)" stroke-width="1.5"/>
                    <circle cx="16" cy="8" r="2.5" fill="url(#lg)"/>
                    <circle cx="8" cy="22" r="2.5" fill="url(#lg)"/>
                    <circle cx="24" cy="22" r="2.5" fill="url(#lg)"/>
                    <line x1="16" y1="8" x2="8" y2="22" stroke="url(#lg)" stroke-width="1" opacity="0.5"/>
                    <line x1="16" y1="8" x2="24" y2="22" stroke="url(#lg)" stroke-width="1" opacity="0.5"/>
                    <line x1="8" y1="22" x2="24" y2="22" stroke="url(#lg)" stroke-width="1" opacity="0.5"/>
                    <defs><linearGradient id="lg" x1="0" y1="0" x2="32" y2="32"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#06b6d4"/></linearGradient></defs>
                </svg>
            </span>
            <span class="logo-text">Network Galaxy</span>
        </div>

        <!-- Breadcrumb navigation -->
        <div class="breadcrumb-wrap">
            <div class="breadcrumb" id="breadcrumb">
                <span class="crumb active">Globe</span>
            </div>
            <span class="level-badge" id="levelLabel">Countries</span>
        </div>

        <div class="header-right">
            <div class="search-wrap" id="searchWrap">
                <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="searchInput" placeholder="Search countries, cities, companies..." autocomplete="off">
                <kbd class="search-kbd" id="searchKbd">/</kbd>
                <div class="search-results" id="searchResults"></div>
            </div>
            <button class="control-btn" id="toggleRotation" title="Pause / Resume">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
            </button>
            <button class="control-btn" id="toggleLines" title="Toggle connections">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
            </button>
        </div>
    </header>

    <!-- Canvas -->
    <canvas id="canvas"></canvas>

    <!-- Node count -->
    <div class="node-count-badge" id="infoPanel">
        <span class="stat-value" id="nodeCount">0</span>
        <span class="stat-label">Nodes</span>
    </div>

    <!-- Controls -->
    <div class="controls-panel" id="controlsPanel">
        <div class="control-group">
            <label>Connection Range</label>
            <input type="range" id="particleSlider" min="30" max="400" value="150">
            <span class="control-value" id="particleValue">150</span>
        </div>
        <div class="control-group">
            <label>Speed</label>
            <input type="range" id="speedSlider" min="1" max="20" value="5">
            <span class="control-value" id="speedValue">5</span>
        </div>
        <div class="control-group">
            <label>Globe Size</label>
            <input type="range" id="sizeSlider" min="15" max="70" value="45">
            <span class="control-value" id="sizeValue">45</span>
        </div>
    </div>

    <!-- Tooltip -->
    <div class="node-tooltip" id="nodeTooltip">
        <div class="tooltip-header">
            <span class="tooltip-dot"></span>
            <span class="tooltip-title"><span id="tooltipId">—</span></span>
        </div>
        <div class="tooltip-body">
            <div class="tooltip-row"><span>Info</span><span id="tooltipPos">—</span></div>
            <div class="tooltip-row"><span>Action&nbsp;</span><span id="tooltipDepth">—</span></div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="footer-left"></div>
        <div class="footer-center">
            <span>Drag to rotate · Scroll to zoom · Click nodes to explore</span>
        </div>
        <div class="footer-right">
            <p>Created by <a href="https://vaevi.com" target="_blank" rel="noopener" class="footer-link">Vaevi Technologies</a></p>
        </div>
    </footer>

    <!-- Company Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div class="modal-body">
                <h3 id="modalTitle">Company</h3>
                <p id="modal-text"></p>
                <div class="modal-stats" id="modalStats"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
